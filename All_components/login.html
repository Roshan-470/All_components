<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">

<title>Login - EcoGuardian</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<h1>Welcome back!</h1>

<p class="subtitle">

Enter your credentials to access your account

</p>

<div class="form">

<label>Email</label>

<input type="email" id="email" placeholder="Enter your email">

<label>Password</label>

<input type="password" id="password" placeholder="Enter your password">

<div class="options">

<label>

<input type="checkbox">

Remember me

</label>

<a href="#">Forgot Password?</a>

</div>

<button onclick="login()">SIGN IN</button>

<p class="signup-text">

Don't have an account?

<a href="signup.html">Sign up now</a>

</p>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<h1 class="logo">EcoGuardian</h1>

<p>

Measure, track and reduce your carbon footprint

using AI and barcode scanning.

</p>

</div>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
